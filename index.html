<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Triangle</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1e2c 0%, #2a2f42 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            color: #eef2fb;
        }
        #app {
            width: 100%;
            max-width: 700px;
            background: rgba(20, 25, 40, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid #3d4a6b;
        }
        .screen { display: flex; flex-direction: column; gap: 20px; }
        h1, h2, h3 { margin: 0; font-weight: 600; letter-spacing: 1px; }
        h1 {
            font-size: 3.8rem;
            text-align: center;
            background: linear-gradient(135deg, #a6c1ff, #c0b3ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 4px 12px rgba(0,20,80,0.5);
        }
        .nickname-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #1f2538;
            padding: 10px 20px;
            border-radius: 60px;
            border: 1px solid #4a5670;
        }
        .nickname-label { font-size: 1.3rem; color: #b7c4e8; }
        #nickname {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffde9e;
            text-align: center;
            outline: none;
            width: 140px;
            border-bottom: 2px dashed #5f73a1;
        }
        .mode-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 10px 0;
        }
        .btn {
            background: #2e3a55;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 14px 28px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px 0 #121724;
            transition: all 0.08s;
            border: 1px solid #61739e;
            flex: 1;
            text-align: center;
        }
        .btn.small { padding: 10px 16px; font-size: 1rem; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #121724; }
        .btn:disabled { opacity: 0.5; transform: none; box-shadow: 0 4px 0 #121724; pointer-events: none; }
        .btn.primary { background: #5f7dcf; border-color: #a3bbff; }
        .btn.warning { background: #b55a5a; border-color: #e68a8a; }
        .lobby-actions, .room-actions { display: flex; gap: 15px; flex-wrap: wrap; }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 10px 0;
        }
        input, select {
            background: #1b2233;
            border: 1px solid #4f6191;
            color: white;
            padding: 14px 18px;
            border-radius: 40px;
            font-size: 1.1rem;
            outline: none;
        }
        .team-selector {
            display: flex;
            gap: 15px;
            justify-content: space-around;
        }
        .team-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 10px 16px;
            border-radius: 30px;
            background: #252e44;
            border: 2px solid transparent;
            transition: 0.1s;
        }
        .team-option.selected { border-color: #ffd966; background: #334十五; }
        .team-option.disabled {
            opacity: 0.4;
            pointer-events: none;
            border-color: #555;
        }
        .player-list {
            background: #191f2c;
            border-radius: 28px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
        }
        .player-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-bottom: 1px solid #334十五;
        }
        .ready-badge { margin-left: auto; color: #6fcf97; font-weight: bold; }
        .game-header { display: flex; align-items: center; gap: 15px; }
        .back-btn {
            background: none;
            border: none;
            font-size: 2.4rem;
            cursor: pointer;
            color: #b0c2f0;
            padding: 0 10px;
        }
        .game-canvas-container { display: flex; justify-content: center; }
        canvas {
            background: #111725;
            border-radius: 24px;
            box-shadow: inset 0 0 10px #00000055, 0 10px 20px #00000040;
            width: 100%;
            aspect-ratio: 1/1;
            touch-action: none;
        }
        .turn-indicator {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 8px;
        }
        .move-actions { display: flex; gap: 20px; justify-content: center; }
        .stats {
            display: flex;
            justify-content: space-around;
            background: #1e2538;
            border-radius: 40px;
            padding: 16px;
        }
        .hidden { display: none !important; }
        .flex-row { display: flex; gap: 12px; align-items: center; }
        .svg-icon { width: 28px; height: 28px; filter: drop-shadow(0 2px 2px black); }
    </style>
</head>
<body>
<div id="app">
    <!-- MENU SCREEN -->
    <div id="menu-screen" class="screen">
        <h1>▲ Triangle</h1>
        <div class="nickname-row">
            <span class="nickname-label">Ник</span>
            <input type="text" id="nickname" value="Ник" maxlength="12">
        </div>
        <div class="mode-buttons">
            <button class="btn" data-mode="1x1">1x1</button>
            <button class="btn" data-mode="2x2">2x2</button>
            <button class="btn" data-mode="3x3">3x3</button>
        </div>
        <button class="btn primary" id="stats-btn">📊 Статистика</button>
        <div id="stats-panel" class="stats hidden">
            <div>1x1: <span id="stat-1x1">0/0</span></div>
            <div>2x2: <span id="stat-2x2">0/0</span></div>
            <div>3x3: <span id="stat-3x3">0/0</span></div>
        </div>
    </div>

    <!-- LOBBY SCREEN -->
    <div id="lobby-screen" class="screen hidden">
        <div class="flex-row">
            <button class="back-btn" id="lobby-back">←</button>
            <h2 id="lobby-mode-title">1x1</h2>
        </div>
        <div class="lobby-actions">
            <button class="btn primary" id="create-room-btn">Создать</button>
            <button class="btn" id="join-room-btn">Присоединиться</button>
        </div>
        <!-- Create panel -->
        <div id="create-panel" class="hidden">
            <div class="input-group">
                <input type="text" id="create-room-name" placeholder="Название комнаты" maxlength="20">
            </div>
            <div class="team-selector" id="create-team-selector"></div>
            <button class="btn primary" id="confirm-create">Создать комнату</button>
            <button class="btn" id="cancel-create">Отмена</button>
        </div>
        <!-- Join panel -->
        <div id="join-panel" class="hidden">
            <div class="input-group">
                <input type="text" id="join-room-name" placeholder="Название комнаты">
                <button class="btn small" id="check-room-btn">Проверить</button>
            </div>
            <div class="team-selector" id="join-team-selector"></div>
            <button class="btn primary" id="confirm-join">Присоединиться</button>
            <button class="btn" id="cancel-join">Отмена</button>
        </div>
    </div>

    <!-- ROOM WAITING SCREEN -->
    <div id="room-screen" class="screen hidden">
        <div class="flex-row">
            <button class="back-btn" id="room-leave">←</button>
            <h2 id="room-title"></h2>
        </div>
        <div>Игроков: <span id="room-players-count">0/2</span></div>
        <div class="player-list" id="room-player-list"></div>
        <div class="room-actions">
            <button class="btn warning" id="room-leave-btn">Выйти</button>
            <button class="btn primary" id="room-ready-btn">Начать</button>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen hidden">
        <div class="game-header">
            <button class="back-btn" id="game-leave">←</button>
            <h3 id="game-room-name"></h3>
        </div>
        <div class="game-canvas-container">
            <canvas id="game-canvas" width="450" height="450"></canvas>
        </div>
        <div class="turn-indicator" id="turn-indicator">Ваш ход</div>
        <div id="move-controls" class="move-actions hidden">
            <button class="btn small" id="move-cancel">Отмена</button>
            <button class="btn small primary" id="move-ok">OK</button>
        </div>
        <div id="game-result" class="hidden" style="text-align:center;"></div>
    </div>
</div>

<script>
    (function(){
        // ---------- SVG иконки ----------
        const SVG = {
            cross: `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#5b9aff" stroke-width="3" stroke-linecap="round"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/></svg>`,
            circle: `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#ff7b7b" stroke-width="3"><circle cx="12" cy="12" r="8"/></svg>`,
            triangle: `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#7ee081" stroke-width="3"><polygon points="12,4 20,18 4,18"/></svg>`,
        };
        function getTeamColor(team){ return team==='X'?'#5b9aff':team==='O'?'#ff7b7b':'#7ee081'; }
        function getTeamName(team){ return team==='X'?'Крестики':team==='O'?'Кружочки':'Треугольники'; }
        function getTeamIcon(team) { return team==='X'?SVG.cross:team==='O'?SVG.circle:SVG.triangle; }

        // ---------- Глобальные переменные ----------
        let ws = null;
        let currentScreen = 'menu';
        let nickname = localStorage.getItem('nick') || 'Ник';
        document.getElementById('nickname').value = nickname;
        let selectedMode = '1x1';
        let roomId = null;
        let myPlayerId = null;
        let myTeam = null;
        let gameState = null;
        
        let stats = JSON.parse(localStorage.getItem('triangle_stats')) || {'1x1':[0,0],'2x2':[0,0],'3x3':[0,0]};
        
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        const screens = {
            menu: document.getElementById('menu-screen'),
            lobby: document.getElementById('lobby-screen'),
            room: document.getElementById('room-screen'),
            game: document.getElementById('game-screen')
        };
        
        // ---------- Вспомогательные функции ----------
        function showScreen(name) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[name].classList.remove('hidden');
            currentScreen = name;
        }
        
        function updateStatsDisplay() {
            document.getElementById('stat-1x1').innerText = `${stats['1x1'][0]}/${stats['1x1'][1]}`;
            document.getElementById('stat-2x2').innerText = `${stats['2x2'][0]}/${stats['2x2'][1]}`;
            document.getElementById('stat-3x3').innerText = `${stats['3x3'][0]}/${stats['3x3'][1]}`;
        }
        function addWin(mode) { stats[mode][0]++; localStorage.setItem('triangle_stats', JSON.stringify(stats)); updateStatsDisplay(); }
        function addLoss(mode) { stats[mode][1]++; localStorage.setItem('triangle_stats', JSON.stringify(stats)); updateStatsDisplay(); }
        
        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}`);
            ws.onopen = () => console.log('WebSocket connected');
            ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
            ws.onclose = () => alert('Соединение потеряно');
        }
        
        function send(data) { if(ws && ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify(data)); }
        
        function handleMessage(msg) {
            const { type, payload } = msg;
            if(type === 'room_created' || type === 'room_joined') {
                roomId = payload.roomId;
                myPlayerId = payload.playerId;
                myTeam = payload.team;
                showScreen('room');
                updateRoomUI(payload.room);
            } else if(type === 'room_update') {
                updateRoomUI(payload);
            } else if(type === 'room_info') {
                // Используется для проверки комнаты перед присоединением
                updateJoinTeamSelector(payload);
            } else if(type === 'game_started') {
                gameState = payload;
                showScreen('game');
                document.getElementById('game-room-name').innerText = `Комната: ${payload.roomName || ''}`;
                renderGame();
            } else if(type === 'game_update') {
                gameState = payload;
                renderGame();
                if(gameState.winner) showGameResult();
            } else if(type === 'error') {
                alert(payload.message);
            }
        }
        
        // ---------- Рендер комнаты ожидания ----------
        function updateRoomUI(room) {
            document.getElementById('room-title').innerText = `Комната: ${room.name}`;
            const maxSlots = { '1x1':2, '2x2':4, '3x3':9 }[room.mode];
            document.getElementById('room-players-count').innerText = `${Object.keys(room.players).length}/${maxSlots}`;
            const listDiv = document.getElementById('room-player-list');
            listDiv.innerHTML = '';
            const teams = { X:[], O:[], T:[] };
            Object.values(room.players).forEach(p => teams[p.team].push(p));
            ['X','O','T'].forEach(team => {
                if(teams[team].length === 0) return;
                const header = document.createElement('div');
                header.style.color = getTeamColor(team);
                header.style.marginTop = '8px';
                header.innerHTML = `${getTeamName(team)} ${getTeamIcon(team)}`;
                listDiv.appendChild(header);
                teams[team].forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'player-item';
                    div.innerHTML = `<span>${p.nick}</span> ${p.ready ? '<span class="ready-badge">✓</span>' : ''}`;
                    listDiv.appendChild(div);
                });
            });
            const allReady = Object.values(room.players).every(p => p.ready) && Object.keys(room.players).length === maxSlots;
            document.getElementById('room-ready-btn').disabled = !allReady && !room.players[myPlayerId]?.ready;
        }
        
        // Обновление селектора команд при проверке комнаты
        function updateJoinTeamSelector(roomInfo) {
            const container = document.getElementById('join-team-selector');
            const teams = ['X','O','T'];
            container.innerHTML = '';
            const maxPerTeam = { '1x1':1, '2x2':2, '3x3':3 }[roomInfo.mode];
            const occupied = roomInfo.occupied || { X:0, O:0, T:0 };
            teams.forEach(t => {
                const div = document.createElement('div');
                div.className = 'team-option';
                div.dataset.team = t;
                div.innerHTML = getTeamIcon(t) + `<br>${t}`;
                if(occupied[t] >= maxPerTeam) div.classList.add('disabled');
                else {
                    div.addEventListener('click', ()=>{
                        container.querySelectorAll('.team-option').forEach(o=>o.classList.remove('selected'));
                        div.classList.add('selected');
                    });
                }
                container.appendChild(div);
            });
        }
        
        // ---------- Игровое поле (canvas) ----------
        let selectedCell = null;
        function renderGame() {
            if(!gameState) return;
            ctx.clearRect(0,0,450,450);
            ctx.strokeStyle = '#4e6190';
            ctx.lineWidth = 2;
            for(let i=1;i<9;i++) {
                ctx.beginPath();
                ctx.moveTo(i*50,0); ctx.lineTo(i*50,450);
                ctx.moveTo(0,i*50); ctx.lineTo(450,i*50);
                ctx.stroke();
            }
            const board = gameState.board;
            for(let y=0;y<9;y++) for(let x=0;x<9;x++) {
                const cell = board[y][x];
                if(!cell) continue;
                const cx = x*50+25, cy = y*50+25;
                if(cell === 'X') drawCross(cx,cy, getTeamColor('X'));
                else if(cell === 'O') drawCircle(cx,cy, getTeamColor('O'));
                else if(cell === 'T') drawTriangle(cx,cy, getTeamColor('T'));
            }
            // временный символ
            if(gameState.currentTurn === myTeam && gameState.turnPlayer === myPlayerId && selectedCell) {
                const {x,y} = selectedCell;
                if(gameState.board[y][x] === null) {
                    const cx = x*50+25, cy = y*50+25;
                    ctx.globalAlpha = 0.5;
                    if(myTeam==='X') drawCross(cx,cy,getTeamColor('X'));
                    else if(myTeam==='O') drawCircle(cx,cy,getTeamColor('O'));
                    else drawTriangle(cx,cy,getTeamColor('T'));
                    ctx.globalAlpha = 1.0;
                }
            }
            // линии зачёркивания
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#f0e68c';
            if(gameState.lines) {
                gameState.lines.forEach(line => {
                    ctx.beginPath();
                    ctx.moveTo(line.x1*50+25, line.y1*50+25);
                    ctx.lineTo(line.x2*50+25, line.y2*50+25);
                    ctx.stroke();
                });
            }
            const isMyTurn = (gameState.currentTurn === myTeam && gameState.turnPlayer === myPlayerId);
            document.getElementById('turn-indicator').innerText = isMyTurn ? 'Ваш ход' : 'Ход оппонента';
            document.getElementById('move-controls').classList.toggle('hidden', !isMyTurn || !selectedCell);
        }
        
        function drawCross(cx,cy,color){
            ctx.strokeStyle=color; ctx.lineWidth=5;
            ctx.beginPath(); ctx.moveTo(cx-15,cy-15); ctx.lineTo(cx+15,cy+15);
            ctx.moveTo(cx+15,cy-15); ctx.lineTo(cx-15,cy+15); ctx.stroke();
        }
        function drawCircle(cx,cy,color){
            ctx.strokeStyle=color; ctx.lineWidth=5;
            ctx.beginPath(); ctx.arc(cx,cy,16,0,2*Math.PI); ctx.stroke();
        }
        function drawTriangle(cx,cy,color){
            ctx.strokeStyle=color; ctx.lineWidth=5;
            ctx.beginPath(); ctx.moveTo(cx,cy-18); ctx.lineTo(cx+16,cy+12); ctx.lineTo(cx-16,cy+12); ctx.closePath(); ctx.stroke();
        }
        
        function showGameResult() {
            const resultDiv = document.getElementById('game-result');
            resultDiv.classList.remove('hidden');
            if(gameState.winner === 'draw') resultDiv.innerText = 'Ничья!';
            else {
                const team = gameState.winner;
                resultDiv.innerHTML = `Победила команда ${getTeamName(team)} ${getTeamIcon(team)}`;
                if(team === myTeam) addWin(selectedMode); else addLoss(selectedMode);
            }
        }
        
        // ---------- Обработчики событий ----------
        document.querySelectorAll('[data-mode]').forEach(btn => btn.addEventListener('click', (e) => {
            selectedMode = e.target.dataset.mode;
            document.getElementById('lobby-mode-title').innerText = selectedMode;
            showScreen('lobby');
            resetLobbyPanels();
        }));
        
        document.getElementById('stats-btn').addEventListener('click', ()=>{
            document.getElementById('stats-panel').classList.toggle('hidden');
        });
        
        document.getElementById('lobby-back').addEventListener('click', ()=>showScreen('menu'));
        
        function resetLobbyPanels() {
            document.getElementById('create-panel').classList.add('hidden');
            document.getElementById('join-panel').classList.add('hidden');
            renderTeamSelector('create-team-selector');
            // Очищаем селектор присоединения
            document.getElementById('join-team-selector').innerHTML = '';
        }
        
        function renderTeamSelector(containerId) {
            const container = document.getElementById(containerId);
            const teams = ['X','O','T'];
            container.innerHTML = '';
            teams.forEach(t => {
                const div = document.createElement('div');
                div.className = 'team-option';
                div.dataset.team = t;
                div.innerHTML = getTeamIcon(t) + `<br>${t}`;
                div.addEventListener('click', ()=>{
                    container.querySelectorAll('.team-option').forEach(o=>o.classList.remove('selected'));
                    div.classList.add('selected');
                });
                container.appendChild(div);
            });
        }
        
        document.getElementById('create-room-btn').addEventListener('click', ()=>{
            document.getElementById('create-panel').classList.remove('hidden');
            document.getElementById('join-panel').classList.add('hidden');
            renderTeamSelector('create-team-selector');
        });
        document.getElementById('join-room-btn').addEventListener('click', ()=>{
            document.getElementById('join-panel').classList.remove('hidden');
            document.getElementById('create-panel').classList.add('hidden');
        });
        document.getElementById('cancel-create').addEventListener('click', resetLobbyPanels);
        document.getElementById('cancel-join').addEventListener('click', resetLobbyPanels);
        
        document.getElementById('check-room-btn').addEventListener('click', ()=>{
            const roomName = document.getElementById('join-room-name').value.trim();
            if(!roomName) return alert('Введите название');
            send({ type:'check_room', payload: { roomName } });
        });
        
        document.getElementById('confirm-create').addEventListener('click', ()=>{
            const roomName = document.getElementById('create-room-name').value.trim();
            if(!roomName) return alert('Введите название');
            const selected = document.querySelector('#create-team-selector .team-option.selected');
            if(!selected) return alert('Выберите команду');
            const team = selected.dataset.team;
            nickname = document.getElementById('nickname').value.trim() || 'Ник';
            send({ type:'create', payload:{ mode:selectedMode, roomName, team, nick:nickname } });
        });
        
        document.getElementById('confirm-join').addEventListener('click', ()=>{
            const roomName = document.getElementById('join-room-name').value.trim();
            if(!roomName) return alert('Введите название');
            const selected = document.querySelector('#join-team-selector .team-option.selected');
            if(!selected) return alert('Выберите команду');
            const team = selected.dataset.team;
            nickname = document.getElementById('nickname').value.trim() || 'Ник';
            send({ type:'join', payload:{ roomName, team, nick:nickname } });
        });
        
        document.getElementById('room-leave').addEventListener('click', ()=> { if(confirm('Выйти?')) { send({type:'leave_room'}); showScreen('lobby'); } });
        document.getElementById('room-leave-btn').addEventListener('click', ()=> { if(confirm('Выйти?')) { send({type:'leave_room'}); showScreen('lobby'); } });
        document.getElementById('room-ready-btn').addEventListener('click', ()=>{
            send({ type:'toggle_ready' });
        });
        
        document.getElementById('game-leave').addEventListener('click', ()=>{
            if(confirm('Покинуть игру?')) { send({type:'leave_game'}); showScreen('menu'); }
        });
        
        canvas.addEventListener('click', (e) => {
            if(!gameState || gameState.currentTurn !== myTeam || gameState.turnPlayer !== myPlayerId) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = Math.floor((e.clientX - rect.left) * scaleX / 50);
            const y = Math.floor((e.clientY - rect.top) * scaleY / 50);
            if(x<0||x>8||y<0||y>8) return;
            if(gameState.board[y][x] !== null) return;
            selectedCell = {x,y};
            renderGame();
        });
        
        document.getElementById('move-ok').addEventListener('click', ()=>{
            if(selectedCell) {
                send({ type:'make_move', payload: selectedCell });
                selectedCell = null;
                renderGame();
            }
        });
        document.getElementById('move-cancel').addEventListener('click', ()=>{
            selectedCell = null;
            renderGame();
        });
        
        // Инициализация
        updateStatsDisplay();
        connectWebSocket();
