<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1e2c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Triangle</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background: #1a1e2c;
            overflow: hidden;
            position: fixed;
            inset: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            color: #eef2fb;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            background: linear-gradient(145deg, #1a1e2c 0%, #2a2f42 100%);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        #app {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 100vh;
        }
        .screen {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }
        h1, h2, h3 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
        }
        h1 {
            font-size: 3.8rem;
            background: linear-gradient(135deg, #a6c1ff, #c0b3ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 4px 12px rgba(0,20,80,0.5);
            margin-top: 20px;
        }
        .nickname-row {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(31, 37, 56, 0.8);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid #4a5670;
        }
        #nickname {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffde9e;
            text-align: center;
            outline: none;
            width: 160px;
            padding: 6px 0;
        }
        .mode-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 10px 0;
        }
        .btn {
            background: #2e3a55;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 14px 20px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #121724;
            transition: all 0.08s;
            border: 1px solid #61739e;
            flex: 1;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        .btn.small { padding: 10px 16px; font-size: 1rem; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #121724; }
        .btn:disabled { opacity: 0.5; transform: none; box-shadow: 0 4px 0 #121724; pointer-events: none; }
        .btn.primary { background: #5f7dcf; border-color: #a3bbff; }
        .btn.warning { background: #b55a5a; border-color: #e68a8a; }
        .lobby-actions, .room-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 10px 0;
        }
        input {
            background: #1b2233;
            border: 1px solid #4f6191;
            color: white;
            padding: 14px 18px;
            border-radius: 40px;
            font-size: 1.1rem;
            outline: none;
        }
        .team-selector {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 16px 0 24px 0;
        }
        .team-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 12px;
            border-radius: 20px;
            background: #252e44;
            border: 2px solid transparent;
            transition: 0.1s;
            min-width: 70px;
        }
        .team-option svg {
            width: 32px;
            height: 32px;
        }
        .team-option.selected { border-color: #ffd966; background: #334十五; }
        .team-option.disabled {
            opacity: 0.4;
            pointer-events: none;
            border-color: #555;
        }
        .player-list {
            background: #191f2c;
            border-radius: 28px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
        }
        .player-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-bottom: 1px solid #334十五;
        }
        .player-item:last-child { border-bottom: none; }
        .player-nick { flex: 1; }
        .player-team-icon svg {
            width: 24px;
            height: 24px;
            vertical-align: middle;
        }
        .ready-badge {
            margin-left: auto;
            color: #6fcf97;
            font-weight: bold;
            font-size: 1.3rem;
        }
        .game-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 2.4rem;
            cursor: pointer;
            color: #b0c2f0;
            padding: 0 10px;
            line-height: 1;
        }
        .game-canvas-container {
            display: flex;
            justify-content: center;
        }
        canvas {
            background: #111725;
            border-radius: 24px;
            box-shadow: inset 0 0 10px #00000055, 0 10px 20px #00000040;
            width: 100%;
            aspect-ratio: 1/1;
            touch-action: none;
        }
        .turn-indicator {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 8px;
        }
        .move-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            background: #1e2538;
            border-radius: 40px;
            padding: 16px;
        }
        .hidden { display: none !important; }
        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .result-table {
            background: #1e2538;
            border-radius: 24px;
            padding: 16px;
            margin-top: 10px;
        }
        .result-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
        }
        .result-team {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-score {
            font-size: 1.5rem;
            font-weight: bold;
        }
        /* Убираем скролл страницы */
        .no-scroll { overflow: hidden; }
    </style>
</head>
<body>
<div id="app">
    <!-- MENU SCREEN -->
    <div id="menu-screen" class="screen">
        <h1>▲ Triangle</h1>
        <div class="nickname-row">
            <input type="text" id="nickname" value="Ник" maxlength="12" placeholder="Ваш ник">
        </div>
        <div class="mode-buttons">
            <button class="btn" data-mode="1x1">1x1</button>
            <button class="btn" data-mode="2x2">2x2</button>
            <button class="btn" data-mode="3x3">3x3</button>
        </div>
        <button class="btn primary" id="stats-btn">Статистика</button>
        <div id="stats-panel" class="stats hidden">
            <div>1x1: <span id="stat-1x1">0/0</span></div>
            <div>2x2: <span id="stat-2x2">0/0</span></div>
            <div>3x3: <span id="stat-3x3">0/0</span></div>
        </div>
    </div>

    <!-- LOBBY SCREEN -->
    <div id="lobby-screen" class="screen hidden">
        <div class="flex-row">
            <button class="back-btn" id="lobby-back">←</button>
            <h2 id="lobby-mode-title">1x1</h2>
        </div>
        <div class="lobby-actions">
            <button class="btn primary" id="create-room-btn">Создать</button>
            <button class="btn" id="join-room-btn">Присоединиться</button>
        </div>
        <!-- Create panel -->
        <div id="create-panel" class="hidden">
            <div class="input-group">
                <input type="text" id="create-room-name" placeholder="Название комнаты" maxlength="20">
            </div>
            <div class="team-selector" id="create-team-selector"></div>
            <div class="action-buttons">
                <button class="btn primary" id="confirm-create">Создать</button>
                <button class="btn" id="cancel-create">Отмена</button>
            </div>
        </div>
        <!-- Join panel -->
        <div id="join-panel" class="hidden">
            <div class="input-group">
                <input type="text" id="join-room-name" placeholder="Название комнаты">
                <button class="btn small" id="check-room-btn">Проверить</button>
            </div>
            <div class="team-selector" id="join-team-selector"></div>
            <div class="action-buttons">
                <button class="btn primary" id="confirm-join">Присоединиться</button>
                <button class="btn" id="cancel-join">Отмена</button>
            </div>
        </div>
    </div>

    <!-- ROOM WAITING SCREEN -->
    <div id="room-screen" class="screen hidden">
        <div class="flex-row">
            <button class="back-btn" id="room-leave">←</button>
            <h2 id="room-title"></h2>
        </div>
        <div>Игроков: <span id="room-players-count">0/2</span></div>
        <div class="player-list" id="room-player-list"></div>
        <div class="room-actions">
            <button class="btn warning" id="room-leave-btn">Выйти</button>
            <button class="btn primary" id="room-ready-btn">Начать</button>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen hidden">
        <div class="game-header">
            <button class="back-btn" id="game-leave">←</button>
            <h3 id="game-room-name"></h3>
        </div>
        <div class="game-canvas-container">
            <canvas id="game-canvas" width="450" height="450"></canvas>
        </div>
        <div class="turn-indicator" id="turn-indicator">Ваш ход</div>
        <div id="move-controls" class="move-actions hidden">
            <button class="btn small" id="move-cancel">Отмена</button>
            <button class="btn small primary" id="move-ok">OK</button>
        </div>
        <div id="game-result" class="result-table hidden"></div>
    </div>
</div>

<script>
    (function(){
        // Отключаем контекстное меню, зум, скролл
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('touchmove', e => { if (e.target.tagName !== 'INPUT') e.preventDefault(); }, { passive: false });
        
        const SVG = {
            cross: `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#5b9aff" stroke-width="3" stroke-linecap="round"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/></svg>`,
            circle: `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#ff7b7b" stroke-width="3"><circle cx="12" cy="12" r="8"/></svg>`,
            triangle: `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#7ee081" stroke-width="3"><polygon points="12,4 20,18 4,18"/></svg>`,
        };
        function getTeamColor(team){ return team==='X'?'#5b9aff':team==='O'?'#ff7b7b':'#7ee081'; }
        function getTeamName(team){ return team==='X'?'Крестики':team==='O'?'Кружочки':'Треугольники'; }
        function getTeamIcon(team) { return team==='X'?SVG.cross:team==='O'?SVG.circle:SVG.triangle; }

        let ws = null;
        let currentScreen = 'menu';
        let nickname = localStorage.getItem('nick') || 'Ник';
        document.getElementById('nickname').value = nickname;
        let selectedMode = '1x1';
        let roomId = null;
        let myPlayerId = null;
        let myTeam = null;
        let gameState = null;
        let gameEnded = false;
        
        let stats = JSON.parse(localStorage.getItem('triangle_stats')) || {'1x1':[0,0],'2x2':[0,0],'3x3':[0,0]};
        
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        const screens = {
            menu: document.getElementById('menu-screen'),
            lobby: document.getElementById('lobby-screen'),
            room: document.getElementById('room-screen'),
            game: document.getElementById('game-screen')
        };
        
        function showScreen(name) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[name].classList.remove('hidden');
            currentScreen = name;
            gameEnded = false;
        }
        
        function updateStatsDisplay() {
            document.getElementById('stat-1x1').innerText = `${stats['1x1'][0]}/${stats['1x1'][1]}`;
            document.getElementById('stat-2x2').innerText = `${stats['2x2'][0]}/${stats['2x2'][1]}`;
            document.getElementById('stat-3x3').innerText = `${stats['3x3'][0]}/${stats['3x3'][1]}`;
        }
        function addWin(mode) { stats[mode][0]++; localStorage.setItem('triangle_stats', JSON.stringify(stats)); updateStatsDisplay(); }
        function addLoss(mode) { stats[mode][1]++; localStorage.setItem('triangle_stats', JSON.stringify(stats)); updateStatsDisplay(); }
        
        document.getElementById('nickname').addEventListener('input', (e) => {
            nickname = e.target.value.trim() || 'Ник';
            localStorage.setItem('nick', nickname);
        });
        
        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}`);
            ws.onopen = () => console.log('connected');
            ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
            ws.onclose = () => alert('Соединение потеряно');
        }
        function send(data) { if(ws && ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify(data)); }
        
        function handleMessage(msg) {
            const { type, payload } = msg;
            if(type === 'room_created' || type === 'room_joined') {
                roomId = payload.roomId;
                myPlayerId = payload.playerId;
                myTeam = payload.team;
                showScreen('room');
                updateRoomUI(payload.room);
            } else if(type === 'room_update') {
                updateRoomUI(payload);
            } else if(type === 'room_info') {
                updateJoinTeamSelector(payload);
            } else if(type === 'game_started') {
                gameState = payload;
                gameEnded = false;
                showScreen('game');
                document.getElementById('game-room-name').innerText = payload.roomName || '';
                renderGame();
            } else if(type === 'game_update') {
                gameState = payload;
                renderGame();
                if(gameState.winner) {
                    gameEnded = true;
                    showGameResult();
                }
            } else if(type === 'error') {
                alert(payload.message);
            }
        }
        
        function updateRoomUI(room) {
            document.getElementById('room-title').innerText = room.name;
            const maxSlots = { '1x1':2, '2x2':4, '3x3':9 }[room.mode];
            document.getElementById('room-players-count').innerText = `${Object.keys(room.players).length}/${maxSlots}`;
            const listDiv = document.getElementById('room-player-list');
            listDiv.innerHTML = '';
            const teams = { X:[], O:[], T:[] };
            Object.values(room.players).forEach(p => teams[p.team].push(p));
            ['X','O','T'].forEach(team => {
                if(teams[team].length === 0) return;
                const teamDiv = document.createElement('div');
                teamDiv.style.margin = '8px 0 4px';
                teamDiv.style.display = 'flex';
                teamDiv.style.alignItems = 'center';
                teamDiv.style.gap = '8px';
                teamDiv.innerHTML = `<span style="color:${getTeamColor(team)}; font-weight:bold;">${getTeamName(team)}</span> ${getTeamIcon(team)}`;
                listDiv.appendChild(teamDiv);
                teams[team].forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'player-item';
                    div.innerHTML = `<span class="player-nick">${p.nick}</span><span class="player-team-icon">${getTeamIcon(team)}</span>${p.ready ? '<span class="ready-badge">✓</span>' : ''}`;
                    listDiv.appendChild(div);
                });
            });
            document.getElementById('room-ready-btn').disabled = false;
        }
        
        function updateJoinTeamSelector(roomInfo) {
            const container = document.getElementById('join-team-selector');
            container.innerHTML = '';
            const mode = roomInfo.mode;
            const maxPerTeam = { '1x1':1, '2x2':2, '3x3':3 }[mode];
            const occupied = roomInfo.occupied || { X:0, O:0, T:0 };
            const availableTeams = mode === '2x2' ? ['X','O'] : ['X','O','T'];
            availableTeams.forEach(t => {
                const div = document.createElement('div');
                div.className = 'team-option';
                div.dataset.team = t;
                div.innerHTML = getTeamIcon(t);
                if(occupied[t] >= maxPerTeam) div.classList.add('disabled');
                else {
                    div.addEventListener('click', ()=>{
                        container.querySelectorAll('.team-option').forEach(o=>o.classList.remove('selected'));
                        div.classList.add('selected');
                    });
                }
                container.appendChild(div);
            });
        }
        
        let selectedCell = null;
        function renderGame() {
            if(!gameState) return;
            ctx.clearRect(0,0,450,450);
            // сетка
            ctx.strokeStyle = '#4e6190';
            ctx.lineWidth = 2;
            for(let i=1;i<9;i++) {
                ctx.beginPath();
                ctx.moveTo(i*50,0); ctx.lineTo(i*50,450);
                ctx.moveTo(0,i*50); ctx.lineTo(450,i*50);
                ctx.stroke();
            }
            // символы
            const board = gameState.board;
            for(let y=0;y<9;y++) for(let x=0;x<9;x++) {
                const cell = board[y][x];
                if(!cell) continue;
                const cx = x*50+25, cy = y*50+25;
                if(cell === 'X') drawCross(cx,cy, getTeamColor('X'));
                else if(cell === 'O') drawCircle(cx,cy, getTeamColor('O'));
                else if(cell === 'T') drawTriangle(cx,cy, getTeamColor('T'));
            }
            // зачёркивания (поверх символов)
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#f0e68c';
            if(gameState.lines) {
                gameState.lines.forEach(line => {
                    ctx.beginPath();
                    ctx.moveTo(line.x1*50+25, line.y1*50+25);
                    ctx.lineTo(line.x2*50+25, line.y2*50+25);
                    ctx.stroke();
                });
            }
            // временный символ
            if(!gameEnded && gameState.currentTurn === myTeam && gameState.turnPlayer === myPlayerId && selectedCell) {
                const {x,y} = selectedCell;
                if(!gameState.blockedCells || !gameState.blockedCells[`${x},${y}`]) {
                    const cx = x*50+25, cy = y*50+25;
                    ctx.globalAlpha = 0.5;
                    if(myTeam==='X') drawCross(cx,cy,getTeamColor('X'));
                    else if(myTeam==='O') drawCircle(cx,cy,getTeamColor('O'));
                    else drawTriangle(cx,cy,getTeamColor('T'));
                    ctx.globalAlpha = 1.0;
                }
            }
            const isMyTurn = !gameEnded && gameState.currentTurn === myTeam && gameState.turnPlayer === myPlayerId;
            document.getElementById('turn-indicator').innerText = isMyTurn ? 'Ваш ход' : (gameEnded ? 'Игра завершена' : 'Ход оппонента');
            document.getElementById('move-controls').classList.toggle('hidden', !isMyTurn || !selectedCell);
        }
        
        function drawCross(cx,cy,color){
            ctx.strokeStyle=color; ctx.lineWidth=5;
            ctx.beginPath(); ctx.moveTo(cx-15,cy-15); ctx.lineTo(cx+15,cy+15);
            ctx.moveTo(cx+15,cy-15); ctx.lineTo(cx-15,cy+15); ctx.stroke();
        }
        function drawCircle(cx,cy,color){
            ctx.strokeStyle=color; ctx.lineWidth=5;
            ctx.beginPath(); ctx.arc(cx,cy,16,0,2*Math.PI); ctx.stroke();
        }
        function drawTriangle(cx,cy,color){
            ctx.strokeStyle=color; ctx.lineWidth=5;
            ctx.beginPath(); ctx.moveTo(cx,cy-18); ctx.lineTo(cx+16,cy+12); ctx.lineTo(cx-16,cy+12); ctx.closePath(); ctx.stroke();
        }
        
        function showGameResult() {
            const resultDiv = document.getElementById('game-result');
            resultDiv.classList.remove('hidden');
            const scores = gameState.scores;
            const teams = Object.keys(scores).filter(t => scores[t] !== undefined);
            let html = '';
            teams.forEach(team => {
                html += `<div class="result-row"><div class="result-team">${getTeamIcon(team)} ${getTeamName(team)}</div><div class="result-score">${scores[team]}</div></div>`;
            });
            if(gameState.winner === 'draw') html += '<div style="text-align:center; margin-top:10px;">Ничья!</div>';
            else html += `<div style="text-align:center; margin-top:10px;">Победитель: ${getTeamName(gameState.winner)} ${getTeamIcon(gameState.winner)}</div>`;
            resultDiv.innerHTML = html;
            if(gameState.winner !== 'draw' && gameState.winner === myTeam) addWin(selectedMode);
            else if(gameState.winner !== 'draw') addLoss(selectedMode);
        }
        
        // Обработчики
        document.querySelectorAll('[data-mode]').forEach(btn => btn.addEventListener('click', (e) => {
            selectedMode = e.target.dataset.mode;
            document.getElementById('lobby-mode-title').innerText = selectedMode;
            showScreen('lobby');
            resetLobbyPanels();
        }));
        document.getElementById('stats-btn').addEventListener('click', ()=> document.getElementById('stats-panel').classList.toggle('hidden'));
        document.getElementById('lobby-back').addEventListener('click', ()=> showScreen('menu'));
        function resetLobbyPanels() {
            document.getElementById('create-panel').classList.add('hidden');
            document.getElementById('join-panel').classList.add('hidden');
            renderTeamSelector('create-team-selector');
            document.getElementById('join-team-selector').innerHTML = '';
        }
        function renderTeamSelector(containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            ['X','O','T'].forEach(t => {
                const div = document.createElement('div');
                div.className = 'team-option';
                div.dataset.team = t;
                div.innerHTML = getTeamIcon(t);
                div.addEventListener('click', ()=>{
                    container.querySelectorAll('.team-option').forEach(o=>o.classList.remove('selected'));
                    div.classList.add('selected');
                });
                container.appendChild(div);
            });
        }
        document.getElementById('create-room-btn').addEventListener('click', ()=>{
            document.getElementById('create-panel').classList.remove('hidden');
            document.getElementById('join-panel').classList.add('hidden');
            renderTeamSelector('create-team-selector');
        });
        document.getElementById('join-room-btn').addEventListener('click', ()=>{
            document.getElementById('join-panel').classList.remove('hidden');
            document.getElementById('create-panel').classList.add('hidden');
        });
        document.getElementById('cancel-create').addEventListener('click', resetLobbyPanels);
        document.getElementById('cancel-join').addEventListener('click', resetLobbyPanels);
        document.getElementById('check-room-btn').addEventListener('click', ()=>{
            const name = document.getElementById('join-room-name').value.trim();
            if(!name) return alert('Введите название');
            send({ type:'check_room', payload: { roomName: name } });
        });
        document.getElementById('confirm-create').addEventListener('click', ()=>{
            const roomName = document.getElementById('create-room-name').value.trim();
            if(!roomName) return alert('Введите название');
            const selected = document.querySelector('#create-team-selector .team-option.selected');
            if(!selected) return alert('Выберите команду');
            nickname = document.getElementById('nickname').value.trim() || 'Ник';
            localStorage.setItem('nick', nickname);
            send({ type:'create', payload:{ mode:selectedMode, roomName, team: selected.dataset.team, nick:nickname } });
        });
        document.getElementById('confirm-join').addEventListener('click', ()=>{
            const roomName = document.getElementById('join-room-name').value.trim();
            if(!roomName) return alert('Введите название');
            const selected = document.querySelector('#join-team-selector .team-option.selected');
            if(!selected) return alert('Выберите команду');
            nickname = document.getElementById('nickname').value.trim() || 'Ник';
            localStorage.setItem('nick', nickname);
            send({ type:'join', payload:{ roomName, team: selected.dataset.team, nick:nickname } });
        });
        document.getElementById('room-leave').addEventListener('click', ()=> { if(confirm('Выйти?')) { send({type:'leave_room'}); showScreen('lobby'); } });
        document.getElementById('room-leave-btn').addEventListener('click', ()=> { if(confirm('Выйти?')) { send({type:'leave_room'}); showScreen('lobby'); } });
        document.getElementById('room-ready-btn').addEventListener('click', ()=> send({ type:'toggle_ready' }));
        document.getElementById('game-leave').addEventListener('click', ()=>{
            if(confirm('Покинуть игру?')) { send({type:'leave_game'}); showScreen('menu'); }
        });
        canvas.addEventListener('click', (e) => {
            if(gameEnded || !gameState || gameState.currentTurn !== myTeam || gameState.turnPlayer !== myPlayerId) return;
            const rect = canvas.getBoundingClientRect();
            const scale = canvas.width / rect.width;
            const x = Math.floor((e.clientX - rect.left) * scale / 50);
            const y = Math.floor((e.clientY - rect.top) * scale / 50);
            if(x<0||x>8||y<0||y>8) return;
            if(gameState.board[y][x] !== null) return;
            if(gameState.blockedCells && gameState.blockedCells[`${x},${y}`]) return;
            selectedCell = {x,y};
            renderGame();
        });
        document.getElementById('move-ok').addEventListener('click', ()=>{
            if(selectedCell) {
                send({ type:'make_move', payload: selectedCell });
                selectedCell = null;
                renderGame();
            }
        });
        document.getElementById('move-cancel').addEventListener('click', ()=>{ selectedCell = null; renderGame(); });
        
        updateStatsDisplay();
        connectWebSocket();
        showScreen('menu');
    })();
</script>
</body>
</html>
